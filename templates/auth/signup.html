<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>signup - Neurona</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="/static/css/auth/signup.css">
    
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Create Account</h1>
                <p class="login-subtitle">Sign up to get started</p>
            </div>

            {% if message %}
            <div class="flash-message alert-danger">
                <i class="fas fa-info-circle me-2"></i>
                {{ message }}
            </div>
            {% endif %}
            

            <form method="POST" action="/signup" id="signupForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input required type="text" class="form-control" id="username" name="username" placeholder="Enter your username"/>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email address</label>
                    <input required type="email" class="form-control" id="email" name="email" placeholder="Enter your email" />
                    <div id="emailHint" class="hint"></div>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input required type="password" class="form-control" id="password" name="password" placeholder="Create a password" />
                    <div id="passwordHint" class="hint"></div>
                </div>
                <div class="form-group">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input required type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" />
                    <div id="confirmHint" class="hint"></div>
                </div>
                <div class="form-group">
                    <label for="role" class="form-label">Role</label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="">Select role</option>
                        <option value="creator">Creator</option>
                        <option value="investor">Investor</option>
                    </select>
                </div>
                <button type="submit" class="login-btn" id="submitBtn" disabled>
                    Signup
                </button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="/login">Login here</a></p>
            </div>
        </div>
    </div>
    
  <!-- JS -->
  <script src="/static/js/signup.js"></script>

</body>
</html>
